<!doctype html>
<html lang="fa" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythm Editor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ══════════════ TOP BAR ══════════════ -->
    <div id="topbar">
      <div class="logo">TOMBAK</div>
      <div class="separator"></div>
      <div class="piece-info">
        <div class="info-group">
          <div class="info-label">نام قطعه</div>
          <div class="info-value accent" id="disp-name">—</div>
        </div>
        <div class="separator"></div>
        <div class="info-group">
          <div class="info-label">عدد میزان</div>
          <div class="info-value" id="disp-meter">—</div>
        </div>
        <div class="separator"></div>
        <div class="info-group tempo-group">
          <div class="info-label">تمپو</div>
          <div class="tempo-slider-row">
            <input
              type="range"
              id="tempo-slider"
              min="40"
              max="240"
              value="120"
              disabled
              oninput="app.changeTempo(this.value)"
            />
            <span class="info-value" id="disp-tempo">—</span>
          </div>
        </div>
        <div class="separator"></div>
        <div class="info-group">
          <div class="info-label">میزان‌ها</div>
          <div class="info-value" id="disp-rows">—</div>
        </div>
      </div>
    </div>

    <!-- ══════════════ MAIN ══════════════ -->
    <div id="main">
      <!-- RIGHT PANEL (file ops) -->
      <div id="right-panel">
        <div class="panel-title">فایل</div>
        <button class="btn accent-btn" onclick="app.newFile()">New</button>
        <button class="btn" onclick="app.openFile()">Open</button>
        <button class="btn" onclick="app.saveFile()">Save</button>
        <button class="btn" onclick="app.saveAs()">Save As</button>
        <button class="btn wav-btn" onclick="app.saveWav()">💾 WAV</button>
        <div class="btn-divider"></div>
        <button class="btn sound-btn" onclick="app.viewSounds()">
          🎵 Samples<span id="sound-badge"></span>
        </button>
        <button
          class="btn"
          onclick="app.openEsharahModal()"
          style="background: var(--surface2); border-color: var(--border)"
        >
          👉 اشاره
        </button>
      </div>

      <!-- GRID AREA -->
      <div id="grid-area">
        <div id="grid-wrapper">
          <div id="col-header"></div>
          <div id="grid-body"></div>
        </div>
      </div>

      <!-- LEFT PANEL (edit ops) -->
      <div id="left-panel">
        <div class="panel-title">ویرایش</div>
        <div class="btn selected-indicator" id="sel-indicator">میزان: —</div>
        <div class="btn-divider"></div>
        <button class="btn" onclick="app.insertRow()">Insert Empty Msr</button>
        <button class="btn danger" onclick="app.deleteRow()">Empty Msr</button>
        <div class="btn-divider"></div>
        <button class="btn" onclick="app.copyRow()">Copy Msr</button>
        <button class="btn" onclick="app.pasteRow()">insert copied</button>
        <button class="btn" onclick="app.pasteRowReplace()">
          Paste & Replace
        </button>
        <div class="btn-divider"></div>
        <button class="btn danger" onclick="app.removeRow()">Remove Msr</button>
        <div class="btn-divider"></div>
        <button class="btn" onclick="app.appendRow()">New Msr</button>
        <div class="btn-divider"></div>
        <button class="btn triplet-btn" onclick="app.openTripletModal()">
          ⑇ Tuplet
        </button>
        <div class="btn-divider"></div>
        <button
          class="btn play-from-btn"
          id="btn-play-from"
          onclick="app.playFromSelected()"
        >
          ▶| Play from
        </button>
        <button
          class="btn play-only-btn"
          id="btn-play-only"
          onclick="app.playOnlySelected()"
        >
          ▶‖ Play only
        </button>
      </div>
    </div>

    <!-- STATUS BAR -->
    <div id="statusbar">
      <span id="status-msg">برای شروع، New بزنید یا یک فایل Open کنید</span>
    </div>

    <!-- PLAY BAR -->
    <div id="play-bar">
      <button class="play-btn" id="btn-play-once" onclick="app.playOnce()">
        ▶ Play
      </button>
      <button class="play-btn" id="btn-play-loop" onclick="app.playLoop()">
        ⟳ Loop
      </button>
      <button
        class="play-btn"
        id="btn-play-long-loop"
        onclick="app.playLongLoop()"
      >
        ⏱ Long Loop
      </button>
      <div id="long-loop-timer" class="long-loop-timer hidden">
        <div class="llt-ring">
          <svg viewBox="0 0 36 36">
            <circle class="llt-track" cx="18" cy="18" r="15.9" />
            <circle class="llt-fill" id="llt-arc" cx="18" cy="18" r="15.9" />
          </svg>
        </div>
        <span id="llt-text">0:00</span>
      </div>
      <div id="play-position"><div id="play-progress"></div></div>
      <span id="play-time">0:00</span>
    </div>

    <!-- SAVE WAV MODAL -->
    <div class="modal-overlay" id="modal-savewav">
      <div class="modal">
        <h3>▸ ذخیره فایل WAV</h3>
        <div class="field">
          <label>نام فایل (بدون پسوند)</label>
          <input
            type="text"
            id="inp-wavname"
            dir="ltr"
            placeholder="my-rhythm"
          />
        </div>
        <div class="modal-btns">
          <button
            class="btn"
            onclick="
              document.getElementById('modal-savewav').classList.remove('show')
            "
          >
            انصراف
          </button>
          <button class="btn accent-btn" onclick="app.confirmSaveWav()">
            دانلود WAV
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- DYNAMICS DROPDOWN MENU -->
    <div id="dynamics-menu"></div>

    <!-- ══════════════ NEW FILE MODAL ══════════════ -->
    <div class="modal-overlay" id="modal-new">
      <div class="modal">
        <h3>▸ قطعه جدید</h3>
        <div class="field">
          <label>نام قطعه</label>
          <input
            type="text"
            id="inp-name"
            placeholder="مثال: Chaharmezrab Shur"
            dir="auto"
          />
        </div>
        <div class="field">
          <label>تمپو </label>
          <input type="number" id="inp-tempo" value="85" min="20" max="400" />
        </div>
        <div class="field">
          <label>عدد میزان</label>
          <select id="inp-meter">
            <option value="2/4" selected>2/4</option>
            <option value="3/4">3/4</option>
            <option value="4/4">4/4</option>
            <option value="5/4">5/4</option>
            <option value="6/4">6/4</option>
            <option value="7/4">7/4</option>
            <option value="5/8">5/8</option>
            <option value="6/8">6/8</option>
            <option value="7/8">7/8</option>
            <option value="9/8">9/8</option>
            <option value="12/8">12/8</option>
            <option value="6/16">6/16</option>
            <option value="9/16">9/16</option>
            <option value="12/16">12/16</option>
          </select>
        </div>
        <div class="field">
          <label>تعداد میزان‌های اولیه</label>
          <input type="number" id="inp-initrows" value="2" min="1" max="200" />
        </div>
        <div class="modal-btns">
          <button class="btn" onclick="app.cancelNew()">انصراف</button>
          <button class="btn accent-btn" onclick="app.confirmNew()">
            ایجاد
          </button>
        </div>
      </div>
    </div>

    <!-- SAVE AS MODAL -->
    <div class="modal-overlay" id="modal-saveas">
      <div class="modal">
        <h3>▸ ذخیره با نام</h3>
        <div class="field">
          <label>نام فایل</label>
          <input type="text" id="inp-savename" dir="ltr" />
        </div>
        <div class="modal-btns">
          <button
            class="btn"
            onclick="
              document.getElementById('modal-saveas').classList.remove('show')
            "
          >
            انصراف
          </button>
          <button class="btn accent-btn" onclick="app.confirmSaveAs()">
            ذخیره
          </button>
        </div>
      </div>
    </div>
    <!-- LONG LOOP MODAL -->
    <div class="modal-overlay" id="modal-longloop">
      <div class="modal">
        <h3>⏱ Long Loop</h3>
        <div class="field">
          <label>چند دقیقه لوپ شود؟</label>
          <input
            type="number"
            id="inp-longloop-minutes"
            value="5"
            min="1"
            max="120"
            dir="ltr"
          />
        </div>
        <div class="modal-btns">
          <button
            class="btn"
            onclick="
              document.getElementById('modal-longloop').classList.remove('show')
            "
          >
            انصراف
          </button>
          <button class="btn accent-btn" onclick="app.confirmLongLoop()">
            شروع
          </button>
        </div>
      </div>
    </div>

    <!-- VIEW SOUNDS MODAL -->
    <div class="modal-overlay" id="modal-viewsounds">
      <div class="modal modal-sounds">
        <h3>🎵 سمپل‌ها</h3>
        <div id="sounds-list-container">
          <div id="sounds-list-empty" class="sounds-empty">
            هیچ صدایی لود نشده — دکمه «Load Samples» را بزنید
          </div>
          <div id="sounds-list"></div>
        </div>
        <div class="modal-btns" style="margin-top: 18px">
          <button
            class="btn"
            onclick="
              document
                .getElementById('modal-viewsounds')
                .classList.remove('show')
            "
          >
            بستن
          </button>
          <button class="btn sound-btn" onclick="app.loadSounds()">
            ＋ Load Samples
          </button>
        </div>
      </div>
    </div>

    <!-- TEMPO MODAL (موبایل) -->
    <div class="modal-overlay" id="modal-tempo">
      <div class="modal">
        <h3>🎵 تنظیم تمپو</h3>
        <div class="field">
          <label>تمپو (BPM) — بین ۴۰ تا ۲۴۰</label>
          <input
            type="number"
            id="inp-tempo-modal"
            value="120"
            min="40"
            max="240"
            dir="ltr"
          />
        </div>
        <div class="modal-btns">
          <button class="btn" onclick="app.cancelTempoModal()">انصراف</button>
          <button class="btn accent-btn" onclick="app.confirmTempoModal()">
            تأیید
          </button>
        </div>
      </div>
    </div>
    <!-- ══════════════ ESHARAH MODAL ══════════════ -->
    <div class="modal-overlay" id="modal-esharah">
      <div
        class="modal"
        style="
          width: 500px;
          max-width: 96%;
          max-height: 90vh;
          overflow-y: auto;
          display: flex;
          flex-direction: column;
        "
      >
        <h3 style="flex-shrink: 0">👉 لیست اشاره‌ها</h3>
        <div
          id="esharah-list"
          style="
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
            direction: ltr;
            flex: 1;
            overflow-y: auto;
          "
        >
          <script>
            const symbols = ["(_", "d_", "t_", "o_", "1_", "2_", "3_"];
            document.write(
              symbols
                .map(
                  (sym) => `
              <div class="esharah-row" style="display:flex; align-items:center; gap:5px; direction:ltr;">
                <span style="font-weight:700; font-size:13px; width:22px; text-align:center; color:var(--accent); font-family:monospace; flex-shrink:0;">${sym}</span>
                <select class="esharah-sel-1" style="width:70px; min-width:0; padding:4px 2px; background:var(--bg); border:1px solid var(--border); border-radius:5px; color:var(--text); font-size:11px; outline:none;">
                  <option value="">—</option>
                </select>
                <span style="color:var(--text-dim); font-size:11px; flex-shrink:0;">+</span>
                <select class="esharah-sel-2" style="width:70px; min-width:0; padding:4px 2px; background:var(--bg); border:1px solid var(--border); border-radius:5px; color:var(--text); font-size:11px; outline:none;">
                  <option value="">—</option>
                </select>
                <button class="btn" onclick="app.setEsharah('${sym}', this)" style="padding:4px 8px; font-size:11px; flex-shrink:0;">set</button>
                <span class="esharah-preview" style="font-size:11px; color:var(--text-dim); font-family:monospace; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">—</span>
                <button class="btn esharah-play-btn" onclick="app.playEsharahPreview('${sym}', this)" style="padding:4px 8px; font-size:11px; flex-shrink:0; opacity:0.4; pointer-events:none;" disabled>▶</button>
              </div>
            `,
                )
                .join(""),
            );
          </script>
        </div>
        <div class="modal-btns" style="flex-shrink: 0">
          <button
            class="btn"
            onclick="
              document.getElementById('modal-esharah').classList.remove('show')
            "
            style="width: 100%"
          >
            برگشت
          </button>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
    <script>
      window.addEventListener("beforeunload", (e) => {
        // بررسی اینکه آیا پروژه تغییرات ذخیره‌نشده دارد یا خیر
        if (state && state.dirty) {
          // طبق استانداردهای مدرن مرورگرها، متن سفارشی دیگر نمایش داده نمی‌شود
          // اما مقداردهی به returnValue یا preventDefault برای فعال شدن باند هشدار الزامی است.
          e.preventDefault();
          e.returnValue =
            "تغییرات شما ذخیره نشده است. آیا واقعاً قصد خروج دارید؟";
          return e.returnValue;
        }
      });
    </script>
  </body>
</html>
