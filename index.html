<!doctype html>
<html lang="fa" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythm Editor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ══════════════ TOP BAR ══════════════ -->
    <div id="topbar">
      <div class="logo">TOMBAK</div>
      <div class="separator"></div>
      <div class="piece-info">
        <div class="info-group">
          <div class="info-label">نام قطعه</div>
          <div class="info-value accent" id="disp-name">—</div>
        </div>
        <div class="separator"></div>
        <div class="info-group">
          <div class="info-label">عدد میزان</div>
          <div class="info-value" id="disp-meter">—</div>
        </div>
        <div class="separator"></div>
        <div class="info-group tempo-group">
          <div class="info-label">تمپو</div>
          <div class="tempo-slider-row">
            <input
              type="range"
              id="tempo-slider"
              min="40"
              max="240"
              value="120"
              disabled
              oninput="app.changeTempo(this.value)"
            />
            <span class="info-value" id="disp-tempo">—</span>
          </div>
        </div>
        <div class="separator"></div>
        <div class="info-group">
          <div class="info-label">میزان‌ها</div>
          <div class="info-value" id="disp-rows">—</div>
        </div>
        <div class="separator"></div>
        <span id="sound-badge">دیتا موجود نیست</span>
      </div>
    </div>

    <!-- ══════════════ MAIN ══════════════ -->
    <div id="main">
      <!-- RIGHT PANEL (file ops) -->
      <div id="right-panel">
        <div class="panel-title">فایل</div>
        <button class="btn accent-btn" onclick="app.newFile()">New</button>
        <button class="btn" onclick="app.openFile()">Open</button>
        <button class="btn" onclick="app.saveFile()">Save</button>
        <button class="btn" onclick="app.saveAs()">Save As</button>
        <div class="btn-divider"></div>
        <button class="btn sound-btn" onclick="app.loadSounds()">
          🎵 Sounds
        </button>
        <button class="btn view-btn" onclick="app.viewSounds()">
          👁 View
        </button>
      </div>

      <!-- GRID AREA -->
      <div id="grid-area">
        <div id="grid-wrapper">
          <div id="col-header"></div>
          <div id="grid-body"></div>
        </div>
      </div>

      <!-- LEFT PANEL (edit ops) -->
      <div id="left-panel">
        <div class="panel-title">ویرایش</div>
        <div class="btn selected-indicator" id="sel-indicator">میزان: —</div>
        <div class="btn-divider"></div>
        <button class="btn" onclick="app.insertRow()">Insert Empty Msr</button>
        <button class="btn danger" onclick="app.deleteRow()">Empty Msr</button>
        <div class="btn-divider"></div>
        <button class="btn" onclick="app.copyRow()">Copy Msr</button>
        <button class="btn" onclick="app.pasteRow()">insert copied</button>
        <button class="btn" onclick="app.pasteRowReplace()">
          Paste & Replace
        </button>
        <div class="btn-divider"></div>
        <button class="btn danger" onclick="app.removeRow()">Remove Msr</button>
        <div class="btn-divider"></div>
        <button class="btn" onclick="app.appendRow()">New Msr</button>
      </div>
    </div>

    <!-- STATUS BAR -->
    <div id="statusbar">
      <span id="status-msg">برای شروع، New بزنید یا یک فایل Open کنید</span>
    </div>

    <!-- PLAY BAR -->
    <div id="play-bar">
      <button class="play-btn" id="btn-play-once" onclick="app.playOnce()">
        ▶ Play
      </button>
      <button class="play-btn" id="btn-play-loop" onclick="app.playLoop()">
        ⟳ Loop
      </button>
      <button
        class="play-btn"
        id="btn-play-long-loop"
        onclick="app.playLongLoop()"
      >
        ⏱ Long Loop
      </button>
      <div id="long-loop-timer" class="long-loop-timer hidden">
        <div class="llt-ring">
          <svg viewBox="0 0 36 36">
            <circle class="llt-track" cx="18" cy="18" r="15.9" />
            <circle class="llt-fill" id="llt-arc" cx="18" cy="18" r="15.9" />
          </svg>
        </div>
        <span id="llt-text">0:00</span>
      </div>
      <div id="play-position"><div id="play-progress"></div></div>
      <span id="play-time">0:00</span>
      <button
        class="play-btn"
        id="btn-save-wav"
        onclick="app.saveWav()"
        style="
          background: linear-gradient(135deg, #7c3aed, #5b21b6);
          color: #fff;
          margin-right: 0;
          height: 38px;
        "
      >
        💾 WAV
      </button>
    </div>

    <!-- SAVE WAV MODAL -->
    <div class="modal-overlay" id="modal-savewav">
      <div class="modal">
        <h3>▸ ذخیره فایل WAV</h3>
        <div class="field">
          <label>نام فایل (بدون پسوند)</label>
          <input
            type="text"
            id="inp-wavname"
            dir="ltr"
            placeholder="my-rhythm"
          />
        </div>
        <div class="modal-btns">
          <button
            class="btn"
            onclick="
              document.getElementById('modal-savewav').classList.remove('show')
            "
          >
            انصراف
          </button>
          <button class="btn accent-btn" onclick="app.confirmSaveWav()">
            دانلود WAV
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- DYNAMICS DROPDOWN MENU -->
    <div id="dynamics-menu"></div>

    <!-- ══════════════ NEW FILE MODAL ══════════════ -->
    <div class="modal-overlay" id="modal-new">
      <div class="modal">
        <h3>▸ قطعه جدید</h3>
        <div class="field">
          <label>نام قطعه</label>
          <input
            type="text"
            id="inp-name"
            placeholder="مثال: Chaharmezrab Shur"
            dir="auto"
          />
        </div>
        <div class="field">
          <label>تمپو </label>
          <input type="number" id="inp-tempo" value="120" min="20" max="400" />
        </div>
        <div class="field">
          <label>عدد میزان</label>
          <select id="inp-meter">
            <option value="2/4" selected>2/4</option>
            <option value="3/4">3/4</option>
            <option value="4/4">4/4</option>
            <option value="5/4">5/4</option>
            <option value="6/4">6/4</option>
            <option value="7/4">7/4</option>
            <option value="5/8">5/8</option>
            <option value="6/8">6/8</option>
            <option value="7/8">7/8</option>
            <option value="9/8">9/8</option>
            <option value="12/8">12/8</option>
            <option value="6/16">6/16</option>
            <option value="9/16">9/16</option>
            <option value="12/16">12/16</option>
          </select>
        </div>
        <div class="field">
          <label>تعداد میزان‌های اولیه</label>
          <input type="number" id="inp-initrows" value="16" min="1" max="200" />
        </div>
        <div class="modal-btns">
          <button class="btn" onclick="app.cancelNew()">انصراف</button>
          <button class="btn accent-btn" onclick="app.confirmNew()">
            ایجاد
          </button>
        </div>
      </div>
    </div>

    <!-- SAVE AS MODAL -->
    <div class="modal-overlay" id="modal-saveas">
      <div class="modal">
        <h3>▸ ذخیره با نام</h3>
        <div class="field">
          <label>نام فایل</label>
          <input type="text" id="inp-savename" dir="ltr" />
        </div>
        <div class="modal-btns">
          <button
            class="btn"
            onclick="
              document.getElementById('modal-saveas').classList.remove('show')
            "
          >
            انصراف
          </button>
          <button class="btn accent-btn" onclick="app.confirmSaveAs()">
            ذخیره
          </button>
        </div>
      </div>
    </div>
    <!-- LONG LOOP MODAL -->
    <div class="modal-overlay" id="modal-longloop">
      <div class="modal">
        <h3>⏱ Long Loop</h3>
        <div class="field">
          <label>چند دقیقه لوپ شود؟</label>
          <input
            type="number"
            id="inp-longloop-minutes"
            value="5"
            min="1"
            max="120"
            dir="ltr"
          />
        </div>
        <div class="modal-btns">
          <button
            class="btn"
            onclick="
              document.getElementById('modal-longloop').classList.remove('show')
            "
          >
            انصراف
          </button>
          <button class="btn accent-btn" onclick="app.confirmLongLoop()">
            شروع
          </button>
        </div>
      </div>
    </div>

    <!-- VIEW SOUNDS MODAL -->
    <div class="modal-overlay" id="modal-viewsounds">
      <div class="modal modal-sounds">
        <h3>👁 فایل‌های صدای لود شده</h3>
        <div id="sounds-list-container">
          <div id="sounds-list-empty" class="sounds-empty">هیچ صدایی لود نشده</div>
          <div id="sounds-list"></div>
        </div>
        <div class="modal-btns" style="margin-top:18px">
          <button class="btn accent-btn" onclick="app.loadSounds()">+ لود صدا</button>
          <button class="btn" onclick="document.getElementById('modal-viewsounds').classList.remove('show')">بستن</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
